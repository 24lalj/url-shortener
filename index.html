<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart URL Shortener</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 450px; text-align: center; }
        input { width: 100%; padding: 15px; border: 2px solid #dfe6e9; border-radius: 10px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #6c5ce7; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #5649c1; }
        #resultArea { margin-top: 25px; display: none; padding: 15px; border-radius: 10px; border: 1px solid #ddd; }
        .safe-alert { background: #d4edda; color: #155724; }
        .spam-alert { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Smart Shortener</h1>
        <p>Paste your link below to shorten it</p>
        <input type="text" id="urlInput" placeholder="https://example.com/very-long-link">
        <button onclick="process()">Shorten Now</button>
        <div id="resultArea">
            <p id="statusMsg"></p>
            <a id="finalLink" target="_blank" style="font-weight: bold; color: #6c5ce7; word-break: break-all;"></a>
        </div>
    </div>

    <script>
      
    async function process() {
        const url = document.getElementById('urlInput').value;
        const resArea = document.getElementById('resultArea');
        const statusMsg = document.getElementById('statusMsg');
        const finalLink = document.getElementById('finalLink');

        if(!url) return alert("Please enter a URL!");

        try {
            // RELATIVE PATH: We removed 'http://localhost:8000'
            // This makes the browser talk to the Railway server directly
            const response = await fetch(`/shorten?long_url=${encodeURIComponent(url)}`, { 
                method: 'POST' 
            });
            
            if (!response.ok) throw new Error("Server Error");

            const data = await response.json();
            resArea.style.display = 'block';
            finalLink.href = data.short_url;
            finalLink.innerText = data.short_url;
            statusMsg.innerHTML = "✅ Success: Your link is ready!";
            
        } catch (e) {
            alert("Error: Still can't reach backend. Ensure you pushed the newest main.py to GitHub.");
        }
    }

    </script>
</body>
</html>
