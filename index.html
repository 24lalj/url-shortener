<script>
    async function process() {
        const url = document.getElementById('urlInput').value;
        const resArea = document.getElementById('resultArea');
        const statusMsg = document.getElementById('statusMsg');
        const finalLink = document.getElementById('finalLink');

        if(!url) return alert("Please enter a URL first!");

        try {
            // CHANGED: Using a relative path '/shorten' makes the app work on Railway automatically
            const response = await fetch(`/shorten?long_url=${encodeURIComponent(url)}`, {
                method: 'POST'
            });
            
            const data = await response.json();

            resArea.style.display = 'block';
            
            // The Python backend now provides the full correct URL
            finalLink.href = data.short_url;
            finalLink.innerText = data.short_url;

            if(data.is_spam) {
                resArea.className = 'spam-alert';
                statusMsg.innerHTML = "⚠️ <strong>Spam Warning:</strong> This URL looks suspicious, but we shortened it anyway:";
            } else {
                resArea.className = 'safe-alert';
                statusMsg.innerHTML = "✅ <strong>Success:</strong> Smart URL generated successfully:";
            }
        } catch (e) {
            // Updated error message for cloud environment
            alert("Connection error. Ensure your Railway service is 'Online'.");
        }
    }

    function resetForm() {
        document.getElementById('urlInput').value = '';
        document.getElementById('resultArea').style.display = 'none';
    }
</script>
